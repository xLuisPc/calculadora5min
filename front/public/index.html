<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora con historial</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Calculadora Web</h1>

      <section class="calculator-shell" aria-label="Calculadora">
        <p id="operation" class="operation">&nbsp;</p>
        <input id="display" class="display" value="0" readonly />

        <div class="keypad" id="keypad">
          <button type="button" data-action="clear" class="key key-fn">C</button>
          <button type="button" data-action="decimal" class="key">.</button>
          <button type="button" data-action="operator" data-operator="/" class="key key-op">÷</button>
          <button type="button" data-action="operator" data-operator="*" class="key key-op">×</button>

          <button type="button" data-action="number" data-value="7" class="key">7</button>
          <button type="button" data-action="number" data-value="8" class="key">8</button>
          <button type="button" data-action="number" data-value="9" class="key">9</button>
          <button type="button" data-action="operator" data-operator="-" class="key key-op">−</button>

          <button type="button" data-action="number" data-value="4" class="key">4</button>
          <button type="button" data-action="number" data-value="5" class="key">5</button>
          <button type="button" data-action="number" data-value="6" class="key">6</button>
          <button type="button" data-action="operator" data-operator="+" class="key key-op">+</button>

          <button type="button" data-action="number" data-value="1" class="key">1</button>
          <button type="button" data-action="number" data-value="2" class="key">2</button>
          <button type="button" data-action="number" data-value="3" class="key">3</button>
          <button type="button" data-action="equals" class="key key-eq">=</button>

          <button type="button" data-action="number" data-value="0" class="key key-zero">0</button>
        </div>
      </section>

      <p id="error" class="error"></p>

      <section>
        <h2>Historial</h2>
        <ul id="history" class="history-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
 </html>
